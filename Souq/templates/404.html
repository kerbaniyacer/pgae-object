{% extends 'base.html' %}
{% load static %}

{% block title %}الصفحة غير موجودة - سوق{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-gradient-to-b from-page-bg to-[#EDE8E1] px-4">
    <div class="max-w-md w-full text-center">
        <!-- 404 Icon -->
        <div class="relative mb-8">
            <div class="text-[120px] font-headline font-bold text-sage/10 leading-none select-none">404</div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-24 h-24 bg-surface rounded-3xl shadow-xl border border-border-sand flex items-center justify-center transform -rotate-12 hover:rotate-0 transition-transform duration-500">
                    <svg class="w-12 h-12 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="font-headline text-3xl font-bold text-text-primary mb-4">عذراً، الصفحة غير موجودة</h1>
        <p class="text-text-secondary mb-8">
            يبدو أنك سلكت طريقاً خاطئاً. الصفحة التي تبحث عنها قد تم نقلها أو حذفها.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'store:home' %}" class="btn-primary px-8 py-3 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark transition-all shadow-lg shadow-sage/20 flex items-center justify-center gap-2">
                <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                </svg>
                العودة للرئيسية
            </a>
            <a href="{% url 'store:products' %}" class="px-8 py-3 bg-surface border border-border-sand text-text-primary rounded-xl font-medium hover:bg-page-bg transition-all flex items-center justify-center gap-2">
                تصفح المنتجات
            </a>
        </div>

        <!-- Search Suggestion -->
        <div class="mt-12 pt-8 border-t border-border-sand">
            <p class="text-sm text-text-placeholder mb-4">أو يمكنك البحث عن ما تريد:</p>
            <form action="{% url 'store:products' %}" method="get" class="relative max-w-sm mx-auto">
                <input type="text" name="q" placeholder="ابحث عن منتجات..." class="w-full pl-12 pr-4 py-3 bg-surface border border-border-sand rounded-xl focus:border-sage focus:ring-2 focus:ring-sage/10 outline-none transition-all">
                <button type="submit" class="absolute left-3 top-1/2 -translate-y-1/2 text-text-placeholder hover:text-sage transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
