{% extends 'base.html' %}
{% load static %}

{% block title %}تتبع الطلب - سوق{% endblock %}

{% block content %}
<div class="bg-page-bg min-h-screen py-12">
    <div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
        
        <div class="bg-surface rounded-3xl border border-border-sand p-8 md:p-12 shadow-sm">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-sage-light text-sage mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 21h7a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v11m0 5l4.879-4.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242z"/>
                    </svg>
                </div>
                <h1 class="font-headline text-3xl font-bold text-text-primary mb-3">تتبع طلبك</h1>
                <p class="text-text-secondary">أدخل بيانات طلبك لمعرفة حالته وتفاصيل الشحن</p>
            </div>

            <!-- Form -->
            <form method="POST" action="{% url 'store:track_order' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="order_number" class="block text-sm font-medium text-text-primary mb-2">رقم الطلب</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-text-placeholder">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
                            </svg>
                        </div>
                        <input type="text" id="order_number" name="order_number" required
                            class="w-full pl-4 pr-12 py-3 bg-page-bg border border-border-sand rounded-xl focus:ring-2 focus:ring-sage focus:border-sage transition-all outline-none drop-shadow-sm"
                            placeholder="مثال: ORD12345678" style="direction: ltr; text-align: right;">
                    </div>
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-text-primary mb-2">رقم الهاتف أو البريد الإلكتروني</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-text-placeholder">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </div>
                        <input type="text" id="phone" name="phone" required
                            class="w-full pl-4 pr-12 py-3 bg-page-bg border border-border-sand rounded-xl focus:ring-2 focus:ring-sage focus:border-sage transition-all outline-none drop-shadow-sm"
                            placeholder="أدخل رقم الهاتف للتحقق" style="direction: ltr; text-align: right;">
                    </div>
                    <p class="text-xs text-text-placeholder mt-2">نطلب هذه المعلومة لحماية خصوصية بياناتك.</p>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full btn-primary py-4 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <span>البحث عن الطلب</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
        
    </div>
</div>
{% endblock %}
