<!DOCTYPE html>
<html dir="rtl">
<head>

</head>
<body style="font-family: Arial; background:#F8F6F2; padding:20px;">

<div style="background:#fff; padding:20px; border-radius:10px;">

    <h2>📩 طلب مساعدة جديد</h2>

    <p><strong>👤 الاسم:</strong> {{ username }}</p>
    <p><strong>📧 البريد:</strong> {{ email }}</p>

    <p><strong>📝 الوصف:</strong></p>
    <p style="background:#f5f5f5; padding:10px; border-radius:6px;">
        {{ description }}

    <p><strong>🌐 الصفحة:</strong> {{ page_url }}</p>

</div>

</body>
</html>
