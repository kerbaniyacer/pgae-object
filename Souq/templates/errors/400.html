{% extends 'error.html' %}

{% block title %}طلب غير صالح (400) - سوق{% endblock %}

{% block error_content %}
<div class="max-w-4xl mx-auto text-center" data-animate>
    <div class="relative mb-8">
        <div class="w-32 h-32 md:w-40 md:h-40 mx-auto bg-status-blue-light rounded-full flex items-center justify-center mb-6">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-status-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-6xl md:text-8xl font-bold text-status-blue/20 font-headline">400</h1>
        <h2 class="font-headline text-2xl md:text-3xl font-bold text-text-primary mb-3 -mt-4">طلب غير صالح</h2>
        <p class="text-text-secondary mb-8 max-w-md mx-auto">عذراً، الطلب الذي أرسلته غير صالح. تحقق من البيانات وحاول مرة أخرى.</p>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button onclick="history.back()" class="w-full sm:w-auto px-6 py-3 bg-page-bg border border-border-sand text-text-primary rounded-xl font-medium hover:bg-surface hover:border-sage transition-colors flex items-center justify-center gap-2">
            العودة
        </button>
        <a href="{% url 'store:home' %}" class="w-full sm:w-auto px-6 py-3 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark transition-colors flex items-center justify-center gap-2">
            الصفحة الرئيسية
        </a>
    </div>
</div>
{% endblock %}
