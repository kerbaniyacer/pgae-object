{% extends 'error.html' %}

{% block title %}خطأ في الخادم (500) - سوق{% endblock %}

{% block error_content %}
<div class="max-w-4xl mx-auto text-center" data-animate>
    <div class="relative mb-8">
        <div class="w-32 h-32 md:w-40 md:h-40 mx-auto bg-taupe-light rounded-full flex items-center justify-center mb-6">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-taupe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h1 class="text-6xl md:text-8xl font-bold text-taupe/20 font-headline">500</h1>
        <h2 class="font-headline text-2xl md:text-3xl font-bold text-text-primary mb-3 -mt-4">خطأ في الخادم</h2>
        <p class="text-text-secondary mb-8 max-w-md mx-auto">عذراً، حدث خطأ غير متوقع. نحن نعمل على حله. يرجى المحاولة لاحقاً.</p>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button onclick="location.reload()" class="w-full sm:w-auto px-6 py-3 bg-page-bg border border-border-sand text-text-primary rounded-xl font-medium hover:bg-surface hover:border-sage transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            إعادة المحاولة
        </button>
        <a href="{% url 'store:home' %}" class="w-full sm:w-auto px-6 py-3 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            الصفحة الرئيسية
        </a>
    </div>
</div>
{% endblock %}
