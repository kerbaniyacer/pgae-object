{% extends 'error.html' %}

{% block title %}الصفحة غير موجودة (404) - سوق{% endblock %}

{% block error_content %}
<div class="max-w-4xl mx-auto text-center" data-animate>
    <div class="relative mb-8">
        <div class="w-32 h-32 md:w-40 md:h-40 mx-auto bg-sage-light rounded-full flex items-center justify-center mb-6">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h1 class="text-6xl md:text-8xl font-bold text-sage/20 font-headline">404</h1>
        <h2 class="font-headline text-2xl md:text-3xl font-bold text-text-primary mb-3 -mt-4">الصفحة غير موجودة</h2>
        <p class="text-text-secondary mb-8 max-w-md mx-auto">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button onclick="history.back()" class="w-full sm:w-auto px-6 py-3 bg-page-bg border border-border-sand text-text-primary rounded-xl font-medium hover:bg-surface hover:border-sage transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            العودة
        </button>
        <a href="{% url 'store:home' %}" class="w-full sm:w-auto px-6 py-3 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            الصفحة الرئيسية
        </a>
    </div>
</div>
{% endblock %}
