{% extends 'error.html' %}

{% block title %}الوصول محظور (403) - سوق{% endblock %}

{% block error_content %}
<div class="max-w-4xl mx-auto text-center" data-animate>
    <div class="relative mb-8">
        <div class="w-32 h-32 md:w-40 md:h-40 mx-auto bg-rose-light rounded-full flex items-center justify-center mb-6">
            <svg class="w-16 h-16 md:w-20 md:h-20 text-rose" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636m12.728 12.728L5.636 5.636"/>
            </svg>
        </div>
        <h1 class="text-6xl md:text-8xl font-bold text-rose/20 font-headline">403</h1>
        <h2 class="font-headline text-2xl md:text-3xl font-bold text-text-primary mb-3 -mt-4">الوصول محظور</h2>
        <p class="text-text-secondary mb-8 max-w-md mx-auto">عذراً، ليس لديك صلاحية للوصول إلى هذه الصفحة.</p>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <button onclick="history.back()" class="w-full sm:w-auto px-6 py-3 bg-page-bg border border-border-sand text-text-primary rounded-xl font-medium hover:bg-surface hover:border-sage transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            العودة
        </button>
        <a href="{% url 'store:home' %}" class="w-full sm:w-auto px-6 py-3 bg-sage text-white rounded-xl font-medium hover:bg-sage-dark transition-colors flex items-center justify-center gap-2">
            الصفحة الرئيسية
        </a>
    </div>
</div>
{% endblock %}
